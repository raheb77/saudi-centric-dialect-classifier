data:
  train_path: data/processed/train_core.csv
  dev_path: data/processed/dev_core.csv
  text_column: processed_text
  target_column: macro_label

artifacts:
  classical_predictions_path: artifacts/reports/classical_baseline_dev_predictions.csv
  gemini_predictions_path: artifacts/reports/llm_gemini_flash_lite_dev_predictions.csv

labels:
  order:
    - Saudi
    - Egyptian
    - Levantine
    - Maghrebi

provider:
  name: anthropic_messages
  model: claude-sonnet-4-20250514
  api_base: https://api.anthropic.com/v1/messages
  api_key_env: ANTHROPIC_API_KEY
  timeout_seconds: 60
  max_retries: 2
  input_price_per_1m_tokens: 3.0
  output_price_per_1m_tokens: 15.0

inference:
  batch_size: 20
  temperature: 0.0
  max_completion_tokens: 400

few_shot:
  examples_per_class: 2

output:
  report_dir: artifacts/reports
  prefix: llm_sonnet_hard_subset
